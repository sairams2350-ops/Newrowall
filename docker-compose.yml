services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: neurowall
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neurowall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U neurowall" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://neurowall:password@postgres:5432/neurowall
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-in-production
      AGENT_SECRET_KEY: change-this-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ml:/ml
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://neurowall:password@postgres:5432/neurowall
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-in-production
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend:/app
      - ./ml:/ml
    command: celery -A app.celery_app worker --loglevel=info

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:8000
      WS_URL: ws://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    environment:
      - API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data:


